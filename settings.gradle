pluginManagement {
    def flutterSdkPath = {
        def flutterRoot = System.env.FLUTTER_ROOT
        if (flutterRoot) {
            return flutterRoot
        }

        def flutterProperties = new File(rootDir.parentFile, '.flutter-properties')
        if (flutterProperties.exists()) {
            def properties = new Properties()
            properties.load(flutterProperties.newInputStream())
            return properties.getProperty('flutter.sdk')
        }

        return System.getenv("FLUTTER_ROOT")
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.7.10" apply false
}

include ":app"

def localPropertiesFile = new File(rootDir, "local.properties")
def properties = new Properties()

assert localPropertiesFile.exists()
properties.load(localPropertiesFile.newInputStream())

def flutterSdkPath = properties.getProperty("flutter.sdk")
assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
assert flutterSdkPath.endsWith(File.separator + "flutter"), "flutter.sdk should end with /flutter."
