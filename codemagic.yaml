workflows:
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      vars:
        FLUTTER_VERSION: stable
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch:
        include:
          - main
          - master
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/flutter" > android/local.properties
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      vars:
        FLUTTER_VERSION: stable
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch:
        include:
          - main
          - master
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
